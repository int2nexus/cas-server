# 평문 예시. 실제로는 이 값을 채운 뒤 `kubeseal`로 봉인해 클러스터에 적용한다.
#   kubectl create secret generic nexus-server --dry-run=client -o yaml \
#     --from-literal=NEXUS__DATABASE__URL='postgres://user:pass@pg-host:5432/nexus' \
#     --from-literal=NEXUS__CAS__KEY_ID='...' \
#     --from-literal=NEXUS__CAS__SECRET='...' \
#     --from-literal=NEXUS__JWT__SECRET='...' \
#     | kubeseal --format yaml > sealed-nexus-server.yaml
apiVersion: v1
kind: Secret
metadata:
  name: nexus-server   # values.secret.existingSecret 또는 기본 fullname 과 일치해야 함
type: Opaque
stringData:
  NEXUS__DATABASE__URL: "postgres://user:pass@pg-host:5432/nexus"
  NEXUS__CAS__KEY_ID: "CHANGE_ME"
  NEXUS__CAS__SECRET: "CHANGE_ME"
  NEXUS__JWT__SECRET: "CHANGE_ME"
