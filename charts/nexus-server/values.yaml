# nexus-server Helm Chart — values.yaml
# 비밀(NEXUS__DATABASE__URL, NEXUS__CAS__KEY_ID/SECRET, NEXUS__JWT__SECRET)은
# 여기에 두지 않는다 — sealed-secret으로 클러스터에 주입하고 envFrom으로 받는다.

image:
  repository: int2jieun/nexus-server
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

# ── 앱 설정 (비밀 외 env) ─────────────────────────────────────────────
server:
  port: 8090
  host: "0.0.0.0"

cas:
  baseUrl: "http://cas-server:80"   # 클러스터 내 cas-server 서비스
  region: "cas-default"
  defaultBucket: "data"

# ── DB 풀 / ingest 동시성 ────────────────────────────────────────────
# 불변식: (SDK flush workers) × ingest.batchItemConcurrency + 예약(≈4) ≤ database.maxConnections.
#   SDK 기본 workers=4 → 4×3 + 4 = 16. 초과하면 커넥션 경합으로 적재가 정체된다.
#   처리량을 더 원하면 둘을 함께 올릴 것(예: maxConnections=40 / batchItemConcurrency=8).
#   replicaCount>1이면 전 replica 풀 합(replicaCount × maxConnections)이 Postgres max_connections 이하여야 함.
database:
  maxConnections: 16          # 항상 주입(어떤 이미지든 안전 — DB url은 secret에서 옴)
ingest:
  # 이미지 코드 기본값이 이미 3이라 보통 비워도 됨(그럼 env 미주입).
  # 값을 넣어 override하려면 **이미지가 config 수정본(IngestConfig 전 필드 serde default) 이상**이어야 한다 —
  # 그 이전 이미지(예: appVersion 0.0.3)에 이 env를 주면 ingest 부분 역직렬화 실패로 기동이 깨진다.
  # 새 이미지로 image.tag를 올린 뒤 3 등으로 설정할 것.
  batchItemConcurrency: "3"

# ── 비밀 Secret 참조 ─────────────────────────────────────────────────
# 이 Secret(아래 4키 보유)을 sealed-secret으로 미리 주입해야 한다:
#   NEXUS__DATABASE__URL, NEXUS__CAS__KEY_ID, NEXUS__CAS__SECRET, NEXUS__JWT__SECRET
# existingSecret 비우면 기본 이름(<fullname>) 사용.
secret:
  existingSecret: ""

service:
  type: NodePort
  port: 80
  targetPort: 8090
  nodePort: 30090

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  host: nexus.example.com
  tls: []

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

terminationGracePeriodSeconds: 30

livenessProbe:
  httpGet:
    path: /_internal/health
    port: 8090
  initialDelaySeconds: 20
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /_internal/health
    port: 8090
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

extraEnv:
  - name: RUST_LOG
    value: "info"

podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
serviceAccount:
  create: false
  name: ""
