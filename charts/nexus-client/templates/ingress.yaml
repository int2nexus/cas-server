{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nexus-client.fullname" . }}
  labels:
    {{- include "nexus-client.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # 모든 경로 → FE(Caddy). Caddy 가 /api 는 백엔드로, 나머지는 정적 SPA 로.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "nexus-client.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
