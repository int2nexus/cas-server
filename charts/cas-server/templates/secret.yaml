apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cas-server.fullname" . }}
  labels:
    {{- include "cas-server.labels" . | nindent 4 }}
type: Opaque
# stringData: Kubernetes가 자동으로 base64 인코딩 처리
stringData:
  db-password: {{ .Values.secrets.dbPassword | quote }}
  {{- if eq .Values.storage.mode "s3" }}
  s3-access-key-id: {{ .Values.secrets.s3AccessKeyId | quote }}
  s3-secret-access-key: {{ .Values.secrets.s3SecretAccessKey | quote }}
  {{- end }}
  auth-secret-master-key: {{ .Values.auth.secretMasterKey | quote }}
  auth-admin-token: {{ .Values.auth.adminToken | quote }}
  auth-root-access-key-id: {{ .Values.auth.rootAccessKeyId | quote }}
  auth-root-secret-key: {{ .Values.auth.rootSecretKey | quote }}
