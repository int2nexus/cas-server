# ─────────────────────────────────────────────────────────────────────────────
# cas-server Helm Chart — values.yaml
#
# 배포 환경별 오버라이드는 별도 values-{env}.yaml 파일 사용:
#   helm install cas-server ./helm/cas-server -f values-prod.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── 이미지 ────────────────────────────────────────────────────────────────────
image:
  repository: int2jieun/cas-server # Docker Hub에 미리 빌드된 이미지 사용
  tag: "0.1.8"
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

# ── 앱 설정 (ConfigMap → /app/config/default.toml) ───────────────────────────
config:
  port: 8080
  maxUploadSizeBytes: 10737418240    # 10 GiB
  inlineHashLimitBytes: 268435456   # 256 MiB
  gcIntervalSecs: 0                 # Pod 자체 GC 비활성화 — gc-cronjob이 단독으로 트리거
  dbMaxConnections: 20              # DB 커넥션 풀 최대 연결 수 (replica 수 × 값이 PG max_connections 미만이어야 함)
  dbAcquireTimeoutSecs: 10          # DB 커넥션 획득 타임아웃 (초) — 부하 시 빠른 실패 선호

# ── 스토리지 백엔드 ────────────────────────────────────────────────────────────
storage:
  mode: "s3"
  # S3 모드: 자격증명은 secrets 섹션에서 Secret으로 주입
  s3:
    endpoint: ""
    bucket: ""        # TODO: 실제 버킷 이름으로 변경
    region: ""        # S3 호환 스토리지의 경우 region은 임의값 가능
    keyPrefix: ""
    allowHttp: true   # S3 호환 스토리지에서 HTTP 사용 시 true로 설정 (예: MinIO 로컬 배포)      

# ── 외부 DB 접속 정보 ─────────────────────────────────────────────────────────
externalDatabase:
  host: ""
  port: 5432
  username: ""
  database: ""
  # 비밀번호는 secrets.dbPassword 에서 가져옴

# ── 자격증명 (Kubernetes Secret으로 생성됨) ──────────────────────────────────
secrets:
  dbPassword: ""
  s3AccessKeyId: ""
  s3SecretAccessKey: ""

# ── 인증 설정 ─────────────────────────────────────────────────────────────────
# 빈 문자열로 두면 NoAuth 모드 (auth 비활성화, 하위호환 유지)
# secretMasterKey 설정 시 SigV4 인증 활성화
auth:
  secretMasterKey: ""   # AES-GCM 마스터 키 (64 hex chars = 32 bytes). openssl rand -hex 32  →  64자 hex 문자열 생성
  adminToken: ""        # Admin API (/_internal/*) 보호용 Bearer 토큰. 빈 문자열이면 인증 스킵.
  rootAccessKeyId: ""   # 서버 시작 시 자동 프로비저닝될 루트 IAM 키 ID
  rootSecretKey: ""     # 루트 키의 시크릿 (평문, 서버가 암호화해서 저장)

# ── 서비스 ────────────────────────────────────────────────────────────────────
service:
  type: NodePort
  port: 80
  targetPort: 8080
  nodePort: 30080

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: "nginx"
  annotations:
    # 대용량 파일 업로드 지원 (최대 10 GiB)
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  host: cas.example.com
  tls: []

# ── 리소스 ────────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

terminationGracePeriodSeconds: 60

# ── 헬스체크 프로브 ───────────────────────────────────────────────────────────
# GET /_internal/health → DB ping + 백엔드 가용성 검사 (503 if degraded)
livenessProbe:
  httpGet:
    path: /_internal/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /_internal/health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# ── 추가 환경변수 ─────────────────────────────────────────────────────────────
# 표준 CAS__ env var 형태로 추가 설정 주입 가능
extraEnv:
  - name: RUST_LOG
    value: "info"

# ── Pod 보안 컨텍스트 ─────────────────────────────────────────────────────────
podSecurityContext: {}

securityContext: {}

# ── 노드 스케줄링 ─────────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}

# ── 서비스 어카운트 ───────────────────────────────────────────────────────────
serviceAccount:
  create: false
  name: ""

# ── GC CronJob ────────────────────────────────────────────────────────────────
# Pod 자체 GC(gcIntervalSecs=0)를 끄고 CronJob 한 대만 GC를 트리거.
# concurrencyPolicy: Forbid 로 GC Job이 겹쳐서 실행되지 않도록 보장.
gc:
  enabled: true
  # cron 표현식 — 기본 1시간마다 (서버 시작 후 첫 실행은 다음 정각)
  schedule: "0 * * * *"
  # Job이 이 시간(초) 안에 완료되지 않으면 강제 종료
  activeDeadlineSeconds: 3600
  image:
    repository: curlimages/curl
    tag: "8.7.1"
    pullPolicy: IfNotPresent
