# ─────────────────────────────────────────────────────────────────────────────
# cas-server SealedSecret
#
# kubeseal로 암호화된 시크릿입니다. git 커밋 안전.
# Sealed Secrets controller가 클러스터에서 복호화하여 Secret을 생성합니다.
#
# ── 최초 생성 절차 ────────────────────────────────────────────────────────────
#
# 1. 평문 Secret 임시 생성 (커밋 금지 — 작업 후 바로 삭제)
#
#   kubectl create secret generic cas-server \
#     --namespace=default \
#     --from-literal=db-password='...' \
#     --from-literal=s3-access-key-id='...' \
#     --from-literal=s3-secret-access-key='...' \
#     --from-literal=auth-secret-master-key='...' \
#     --from-literal=auth-admin-token='...' \
#     --from-literal=auth-root-access-key-id='...' \
#     --from-literal=auth-root-secret-key='...' \
#     --dry-run=client -o yaml > /tmp/secret-plain.yaml
#
#   참고) auth-secret-master-key 생성: openssl rand -hex 32
#
# 2. kubeseal로 암호화
#
#   kubeseal --format yaml < /tmp/secret-plain.yaml > sealed-secret.yaml
#
# 3. 평문 파일 즉시 삭제
#
#   rm /tmp/secret-plain.yaml
#
# 4. sealed-secret.yaml git 커밋
#
# ── 값 교체 시 ────────────────────────────────────────────────────────────────
#
#   위 절차를 반복하여 sealed-secret.yaml을 재생성하고 커밋합니다.
#   클러스터에 적용하면 controller가 자동으로 Secret을 갱신합니다.
#
# ── 클러스터 적용 ─────────────────────────────────────────────────────────────
#
#   kubectl apply -f sealed-secret.yaml
#   (Helm 배포 전에 실행해야 Secret이 준비됩니다)
#
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cas-server        # Helm 릴리즈명과 동일하게 맞출 것 (cas-server.fullname 결과)
  namespace: default      # 배포 네임스페이스와 동일하게 맞출 것
spec:
  encryptedData:
    # kubeseal 실행 후 생성된 암호화 값으로 교체
    db-password: ""
    s3-access-key-id: ""
    s3-secret-access-key: ""
    auth-secret-master-key: ""
    auth-admin-token: ""
    auth-root-access-key-id: ""
    auth-root-secret-key: ""
  template:
    metadata:
      name: cas-server
      namespace: default
    type: Opaque
